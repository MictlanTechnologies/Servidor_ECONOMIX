spring.application.name=economix

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/economix?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=${ECONOMIX_DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

economix.cors.allowed-origins=*

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT secret obligatorio. Si no está definido, la app falla al iniciar.
# Configura la variable de entorno ECONOMIX_JWT_SECRET (min. 32 bytes).
economix.jwt.secret=${ECONOMIX_JWT_SECRET:}
economix.2fa.key=${ECONOMIX_2FA_KEY:}
economix.ai.gemini.api-key=${GEMINI_API_KEY:}
economix.ai.gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
