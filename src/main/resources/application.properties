spring.application.name=economix


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/economix?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=economix_app
spring.datasource.password=Economix2026_App!

# Configuracin de JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

# Evita que Hibernate intente crear/validar tablas automáticamente.
spring.jpa.hibernate.ddl-auto=none

# Ayuda cuando hay nombres de columnas con caracteres especiales (ñ/acentos).
spring.jpa.properties.hibernate.globally_quoted_identifiers=true


# Configuracin del TransactionManager
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# Configuracion del mySql
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Auth/JWT/2FA
economix.jwt.secret=change-this-jwt-secret-change-this-jwt-secret
economix.2fa.key=change-this-2fa-key-change-this-2fa-key


# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
